[variables]
NIXPACKS_NODE_VERSION = "20"

# Préférer Dockerfile sur Coolify (build_pack = dockerfile).
# Ce fichier sert de repli si Nixpacks est encore sélectionné.

[phases.setup]
nixPkgs = ["nodejs_20", "openssl"]

[phases.install]
cmds = ["npm install --ignore-scripts"]

[phases.build]
cmds = ["npx prisma generate", "npm run build"]

[start]
cmd = "sh scripts/start-production.sh"
