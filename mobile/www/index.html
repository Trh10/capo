<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>CAPO Studio</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, sans-serif;
        background: #f8f4f4;
        color: #201e1d;
      }
      .wrap {
        text-align: center;
        padding: 2rem;
      }
      .logo {
        width: 72px;
        height: 72px;
        margin: 0 auto 1rem;
      }
      p {
        margin: 0;
        color: #6b6462;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <img class="logo" src="icon.png" alt="CAPO Studio" />
      <p>Chargement de CAPO Studio…</p>
    </div>
  </body>
</html>
