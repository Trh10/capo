name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - ".github/workflows/android-apk.yml"

permissions:
  contents: read

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      JAVA_HOME: /usr/lib/jvm/temurin-21.jdk

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Verify Android SDK
        working-directory: .
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager --list_installed | head -20

      - name: Install dependencies
        run: npm ci

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate CAPO icons
        run: node scripts/generate-icons.mjs

      - name: Patch Android config
        run: node scripts/prepare.mjs

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: capo-studio-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Summary
        working-directory: .
        run: |
          echo "### APK CAPO Studio prêt" >> $GITHUB_STEP_SUMMARY
          echo "Téléchargez **capo-studio-debug-apk** dans les artifacts." >> $GITHUB_STEP_SUMMARY
          echo "URL prod : http://t13kzxjdw7jzvip57w31g0oq.51.255.200.11.sslip.io" >> $GITHUB_STEP_SUMMARY
